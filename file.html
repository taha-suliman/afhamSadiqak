<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>افهم صديقك - UI Mockup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F172A] text-white font-sans">

<!-- Screen 1: Join Room -->
<div class="p-6">
  <h1 class="text-3xl font-bold text-center mb-6">🎮 افهم صديقك</h1>
  <div class="bg-[#1E293B] p-6 rounded-2xl max-w-md mx-auto">
    <input type="text" placeholder="Enter Room ID" class="w-full p-3 rounded-lg text-black mb-4">
    <input type="text" placeholder="Your Name" class="w-full p-3 rounded-lg text-black mb-4">
    <button class="w-full bg-purple-500 hover:bg-purple-600 p-3 rounded-lg">Join Room</button>
  </div>
</div>

<!-- Screen 2: Lobby -->
<div class="p-6">
  <h2 class="text-xl mb-4">👥 Players in Room</h2>
  <div class="bg-[#1E293B] p-4 rounded-2xl max-w-md">
    <ul class="space-y-2">
      <li>Ahmed</li>
      <li>Sara</li>
      <li>You</li>
    </ul>
    <button class="mt-4 w-full bg-blue-500 p-2 rounded-lg">Start Game</button>
  </div>
</div>

<!-- Screen 3: True/False Game -->
<div class="p-6">
  <h2 class="text-xl mb-4">❓ هل تحب القهوة؟</h2>
  <div class="flex gap-4">
    <button class="flex-1 bg-green-500 p-4 rounded-xl">✔️ نعم</button>
    <button class="flex-1 bg-red-500 p-4 rounded-xl">❌ لا</button>
  </div>
</div>

<!-- Screen 4: Fill Sentence -->
<div class="p-6">
  <h2 class="text-xl mb-4">📝 أكمل: أنا بخاف من...</h2>
  <input type="text" class="w-full p-3 rounded-lg text-black mb-4" placeholder="Write your answer">
  <button class="bg-purple-500 p-3 rounded-lg">Submit</button>
</div>

<!-- Screen 5: Reveal Answers -->
<div class="p-6">
  <h2 class="text-xl mb-4">😂 الإجابات</h2>
  <div class="space-y-2">
    <div class="bg-[#1E293B] p-3 rounded">Ahmed: الظلام</div>
    <div class="bg-[#1E293B] p-3 rounded">Sara: القطط 😂</div>
  </div>
</div>

<!-- Screen 6: Scoreboard -->
<div class="p-6">
  <h2 class="text-xl mb-4">🏆 Leaderboard</h2>
  <div class="space-y-2">
    <div class="bg-[#1E293B] p-3 rounded">Ahmed - 50 pts</div>
    <div class="bg-[#1E293B] p-3 rounded">Sara - 40 pts</div>
  </div>
</div>

</body>
</html>
